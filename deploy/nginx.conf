# nginx — reverse proxy для Django + раздача статики/медиа напрямую.
# Монтируется в /etc/nginx/conf.d/default.conf

upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Загрузка изображений блюд/галереи — поднимаем лимит тела.
    client_max_body_size 20M;

    # gzip для текстовых ответов API и HTML.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml image/svg+xml;
    gzip_min_length 1024;

    # --- Статика (collectstatic → volume) ------------------------------
    location /static/ {
        alias /vol/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Медиа (загруженные файлы) -------------------------------------
    location /media/ {
        alias /vol/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- Всё остальное → Django (gunicorn) -----------------------------
    # /api/, /admin/, /api-auth/ и HTML-страницы (/, /menu/, /reservation/)
    location / {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}

