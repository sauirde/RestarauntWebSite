# Production stack: Django (gunicorn) + PostgreSQL + nginx.
# Запуск:  docker compose --env-file deploy/.env up -d --build
name: bereke

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-restaurant}
      POSTGRES_USER: ${POSTGRES_USER:-restaurant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-restaurant} -d ${POSTGRES_DB:-restaurant}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [backend]

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - deploy/.env
    environment:
      # entrypoint ждёт БД по этим переменным (сервис называется `db`)
      DB_HOST: db
      DB_PORT: "5432"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    networks: [backend]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"   # включить после настройки TLS-сертификатов
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/vol/static:ro
      - media_volume:/vol/media:ro
    depends_on:
      - web
    networks: [backend]

volumes:
  pgdata:
  static_volume:
  media_volume:

networks:
  backend:
