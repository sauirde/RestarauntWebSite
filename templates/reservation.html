{% load static %}<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Бронирование — Bereke</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{--bg:#000000;--line:#333333;--gold:#AEA79A;--gold-bright:#AEA79A;
    --muted:#C6D2EC;--text:#FFFFFF}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);
    font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh}
  a{color:inherit;text-decoration:none}
  header{padding:18px 0;border-bottom:1px solid var(--line);
    background:rgba(0,0,0,.92)}
  .wrap{width:min(1100px,92vw);margin:0 auto}
  .nav{display:flex;align-items:center;justify-content:space-between}
  .brand{font-family:'Playfair Display',serif;font-size:24px;letter-spacing:.34em;
    color:var(--gold-bright)}
  .nav a.back{font-size:14px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .nav a.back:hover{color:var(--gold-bright)}
  .head{text-align:center;padding:80px 0 36px}
  .eyebrow{font-family:'Playfair Display',serif;letter-spacing:.32em;
    text-transform:uppercase;font-size:12px;color:var(--gold);margin-bottom:14px}
  .head h1{font-family:'Playfair Display',serif;font-size:clamp(32px,5vw,52px)}
  main{padding-bottom:90px}
</style>
</head>
<body>
<header>
  <div class="wrap nav">
    <a href="/" class="brand">BEREKE</a>
    <a href="/" class="back">← На главную</a>
  </div>
</header>

<div class="wrap head">
  <div class="eyebrow">Бронирование</div>
  <h1>Забронировать столик</h1>
</div>

<main>
  <!-- модуль сам отрисует мастер внутри этого контейнера -->
  <div id="reservation-wizard"></div>
</main>

<script src="{% static 'js/reservation.js' %}" defer></script>
</body>
</html>
